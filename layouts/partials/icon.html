{{- $name := . -}}
{{- if eq $name "printer" -}}
<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
  <rect x="14" y="6" width="36" height="14" />
  <rect x="10" y="20" width="44" height="20" />
  <rect x="22" y="40" width="20" height="18" />
  <line x1="22" y1="48" x2="42" y2="48" />
  <line x1="22" y1="53" x2="42" y2="53" />
  <circle cx="46" cy="28" r="2.5" fill="currentColor" stroke="none" />
</svg>
{{- else if eq $name "laser" -}}
<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
  <rect x="8" y="10" width="48" height="12" />
  <line x1="32" y1="22" x2="32" y2="46" stroke-dasharray="3 4" />
  <rect x="18" y="46" width="28" height="10" />
  <line x1="14" y1="16" x2="20" y2="16" />
  <line x1="44" y1="16" x2="50" y2="16" />
</svg>
{{- else if eq $name "gear" -}}
<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
  <circle cx="32" cy="32" r="12" />
  <circle cx="32" cy="32" r="4" fill="currentColor" stroke="none" />
  <path d="M32 8v8M32 48v8M8 32h8M48 32h8M14.3 14.3l5.6 5.6M44.1 44.1l5.6 5.6M49.7 14.3l-5.6 5.6M19.9 44.1l-5.6 5.6" />
</svg>
{{- else if eq $name "plaque" -}}
<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
  <rect x="8" y="14" width="48" height="36" />
  <line x1="16" y1="24" x2="48" y2="24" />
  <line x1="16" y1="32" x2="40" y2="32" />
  <line x1="16" y1="40" x2="44" y2="40" />
</svg>
{{- else -}}
<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
  <rect x="10" y="10" width="44" height="44" />
</svg>
{{- end -}}
