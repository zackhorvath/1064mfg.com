baseURL = "https://1064mfg.com/"
locale = "en-US"
title = "1064MFG"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  tagline = "CUSTOM CREATIONS"
  subtagline = "Additive Manufacturing // Laser Engraving"
  description = "1064MFG - 3D printing and laser engraving services. From rapid prototypes to finished props, built to spec."
  founded = "2026"
  serial = "KENT, WA"

  [params.social]
    instagram = "https://www.instagram.com/horvaticus"
    github = "https://github.com/zackhorvath"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "services"
    name = "Services"
    url = "/#services"
    weight = 20
  [[menu.main]]
    identifier = "work"
    name = "Work"
    url = "/#work"
    weight = 30
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[minify]
  disableXML = true

[outputs]
  home = ["HTML", "RSS"]
