<footer class="site-footer">
  <div class="wrap site-footer__inner">
    <div class="plate">
      <span class="plate__row">{{ .Site.Params.serial }}</span>
      <span class="plate__row">EST. {{ .Site.Params.founded }}</span>
      <span class="plate__row">SHOP: OPERATIONAL</span>
    </div>
    <div class="footer-links">
      {{ with .Site.Params.social.instagram }}<a href="{{ . }}" target="_blank" rel="noopener">INSTAGRAM</a>{{ end }}
      {{ with .Site.Params.social.github }}<a href="{{ . }}" target="_blank" rel="noopener">GITHUB</a>{{ end }}
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
    </div>
    <div class="copyright">&copy; {{ now.Format "2006" }} 1064 MFG LLC. ALL RIGHTS RESERVED.</div>
  </div>
</footer>

<script>
  (function () {
    var root = document.documentElement;
    var btns = document.querySelectorAll(".mode-switch__btn");
    var mq = window.matchMedia("(prefers-color-scheme: light)");

    function current() {
      return root.getAttribute("data-theme") || (mq.matches ? "light" : "dark");
    }
    function reflect() {
      var mode = current();
      btns.forEach(function (b) {
        b.setAttribute("aria-pressed", b.getAttribute("data-mode") === mode ? "true" : "false");
      });
    }
    btns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var mode = btn.getAttribute("data-mode");
        root.setAttribute("data-theme", mode);
        try { localStorage.setItem("1064-theme", mode); } catch (e) {}
        reflect();
      });
    });
    reflect();
  })();
</script>
